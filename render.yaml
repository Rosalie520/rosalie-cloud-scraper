services:
- type: cron
  name: token-fetcher
  runtime: python
  plan: free
  buildCommand: pip install -r requirements.txt && python -m playwright install chromium
  startCommand: python cloud_scraper_auto.py
  schedule: "0 17 * * *"
  envVars:
  - key: TOKEN_SERVER
    scope: build
    value: https://www.rosalie.tw/AI%20Product%20Selector/api/token_manager.php
