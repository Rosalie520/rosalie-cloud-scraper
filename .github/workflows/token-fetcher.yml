name: Daily Token Fetcher

on:
  schedule:
      - cron: '30 9 * * *'
        workflow_dispatch:

        jobs:
          fetch-tokens:
              runs-on: ubuntu-latest

                  steps:
                        - name: Checkout repository
                                uses: actions/checkout@v3

                                      - name: Set up Python
                                              uses: actions/setup-python@v4
                                                      with:
                                                                python-version: '3.9'

                                                                      - name: Install dependencies
                                                                              run: |
                                                                                        python -m pip install --upgrade pip
                                                                                                  pip install playwright requests

                                                                                                        - name: Run token fetcher
                                                                                                                env:
                                                                                                                          TOKEN_SERVER: ${{ secrets.TOKEN_SERVER }}
                                                                                                                                    TOKENS_LIST: ${{ secrets.TOKENS_LIST }}
                                                                                                                                            run: python cloud_scraper_auto.py
                                                                                                                                            
                                                                                                                                                  - name: Upload tokens to server
                                                                                                                                                          if: success()
                                                                                                                                                                  run: |
                                                                                                                                                                            echo "Tokens uploaded successfully"
