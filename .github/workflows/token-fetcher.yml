name: Daily Token Fetcher

on:
  schedule:
      # 每天台北時間 17:30 執行（UTC 09:30）
          - cron: '30 9 * * *'
            # 允許手動觸發
              workflow_dispatch:

              jobs:
                fetch-tokens:
                    runs-on: ubuntu-latest

                            steps:
                                  - name: Checkout repository
                                          uses: actions/checkout@v3

                                                      - name: Set up Python
                                                              uses: actions/setup-python@v4
                                                                      with:
                                                                                python-version: '3.9'

                                                                                            - name: Install dependencies
                                                                                                    run: |
                                                                                                              python -m pip install --upgrade pip
                                                                                                                        pip install playwright requests
                                                                                                                                  playwright install chromium
                                                                                                                                        
                                                                                                                                              - name: Run token fetcher
                                                                                                                                                      env:
                                                                                                                                                                TOKEN_SERVER: ${{ secrets.TOKEN_SERVER }}
                                                                                                                                                                          WECHAT_EMAIL: ${{ secrets.WECHAT_EMAIL }}
                                                                                                                                                                                    WECHAT_PASSWORD: ${{ secrets.WECHAT_PASSWORD }}
                                                                                                                                                                                            run: python cloud_scraper_auto.py
                                                                                                                                                                                                  
                                                                                                                                                                                                        - name: Upload logs
                                                                                                                                                                                                                if: always()
                                                                                                                                                                                                                        uses: actions/upload-artifact@v3
                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                          name: token-fetcher-logs
                                                                                                                                                                                                                                                    path: logs/
                                                                                                                                                                                                                                                              retention-days: 7
